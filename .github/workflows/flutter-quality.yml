name: Flutter quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile Drift web worker
        run: dart compile js -O4 web/drift_worker.dart -o web/drift_worker.dart.js

      - name: Prepare matching sqlite3 wasm
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tool/prepare_drift_web_assets.py

      - name: Verify Drift artifacts
        run: |
          test -s lib/database/app_database.g.dart
          test -s web/drift_worker.dart.js
          test -s web/sqlite3.wasm

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Verify web build contains Drift assets
        run: |
          test -s build/web/drift_worker.dart.js
          test -s build/web/sqlite3.wasm

  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: flutter pub run build_runner build

      - name: Build Android release APK
        run: flutter build apk --release

  ios-simulator-build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: flutter pub run build_runner build

      - name: Build iPhone and iPad Simulator app
        run: flutter build ios --simulator --debug
