name: Flutter quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: audit/migration-readiness-inventory

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze and capture failure
        run: |
          set +e
          mkdir -p diagnostics
          flutter analyze > diagnostics/migration-readiness-analyze-2.txt 2>&1
          status=$?
          cat diagnostics/migration-readiness-analyze-2.txt
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add diagnostics/migration-readiness-analyze-2.txt
            git commit -m "Capture remaining migration readiness analyzer issue"
            git push origin HEAD:audit/migration-readiness-inventory
          fi
          exit "$status"
