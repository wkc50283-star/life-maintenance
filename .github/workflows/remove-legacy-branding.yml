name: Remove legacy branding

on:
  push:
    branches:
      - copy/remove-legacy-branding

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out branding branch
        uses: actions/checkout@v4
        with:
          ref: copy/remove-legacy-branding

      - name: Apply guarded branding cleanup
        run: python3 tool/remove_legacy_branding.py

      - name: Commit branding cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove legacy branding and hardcoded display versions"
          git push origin HEAD:copy/remove-legacy-branding
