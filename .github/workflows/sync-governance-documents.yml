name: Sync governance documents

on:
  push:
    branches:
      - docs/terminology-and-change-log-catchup

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out governance branch
        uses: actions/checkout@v4
        with:
          ref: docs/terminology-and-change-log-catchup

      - name: Sync formal documents
        run: |
          python3 tool/sync_core_governance.py
          python3 tool/sync_change_log_catchup.py
          rm .github/workflows/sync-governance-documents.yml
          rm tool/sync_core_governance.py
          rm tool/sync_change_log_catchup.py

      - name: Commit synchronized governance documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Synchronize terminology and governance records"
          git push origin HEAD:docs/terminology-and-change-log-catchup
