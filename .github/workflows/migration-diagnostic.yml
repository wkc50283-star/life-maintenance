name: Migration diagnostic
on:
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - '.github/workflows/migration-diagnostic.yml'
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Capture output
        shell: bash
        run: |
          set +e
          flutter analyze > analyze-output.txt 2>&1
          echo "$?" > analyze-exit-code.txt
          flutter test test/database/schema_v1_to_v2_migration_test.dart > test-output.txt 2>&1
          echo "$?" > test-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: migration-diagnostic-output
          path: |
            analyze-output.txt
            analyze-exit-code.txt
            test-output.txt
            test-exit-code.txt
