name: Schema analyze diagnostic

on:
  pull_request:
    paths:
      - 'lib/**'
      - '.github/workflows/schema-analyze-diagnostic.yml'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
