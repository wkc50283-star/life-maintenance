name: Schema analyze diagnostic

on:
  pull_request:
    paths:
      - 'lib/**'
      - '.github/workflows/schema-analyze-diagnostic.yml'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Capture analyze output
        shell: bash
        run: |
          set +e
          flutter analyze > analyze-output.txt 2>&1
          code=$?
          echo "$code" > analyze-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: schema-analyze-output
          path: |
            analyze-output.txt
            analyze-exit-code.txt
