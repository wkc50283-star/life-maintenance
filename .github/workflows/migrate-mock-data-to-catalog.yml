name: Migrate mock data to catalog

on:
  push:
    branches:
      - refactor/maintenance-card-catalog

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out catalog branch
        uses: actions/checkout@v4
        with:
          ref: refactor/maintenance-card-catalog

      - name: Apply guarded catalog migration
        run: python3 tool/migrate_mock_data_to_catalog.py

      - name: Commit catalog migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace mock data with formal maintenance card catalog"
          git push origin HEAD:refactor/maintenance-card-catalog
