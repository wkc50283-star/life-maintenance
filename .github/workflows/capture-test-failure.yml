name: Fix remaining direct wording expectations

on:
  push:
    branches:
      - copy/direct-life-wording

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out wording branch
        uses: actions/checkout@v4
        with:
          ref: copy/direct-life-wording

      - name: Replace exact stale expectations
        run: |
          python3 - <<'PY'
          from pathlib import Path

          title_path = Path('test/expiry_reminder_preview_sheet_test.dart')
          title_text = title_path.read_text(encoding='utf-8')
          old_title = "return find.widgetWithText(TextField, '事項名稱');"
          if title_text.count(old_title) != 1:
              raise SystemExit(
                  f'Expected one stale reminder-name finder, found {title_text.count(old_title)}'
              )
          title_path.write_text(
              title_text.replace(
                  old_title,
                  "return find.widgetWithText(TextField, '提醒名稱');",
              ),
              encoding='utf-8',
          )

          detail_path = Path('test/reminder_list_sheet_test.dart')
          detail_text = detail_path.read_text(encoding='utf-8')
          old_detail = "find.text('事項詳情')"
          if detail_text.count(old_detail) != 9:
              raise SystemExit(
                  f'Expected nine stale reminder-detail finders, found {detail_text.count(old_detail)}'
              )
          detail_path.write_text(
              detail_text.replace(old_detail, "find.text('提醒詳情')"),
              encoding='utf-8',
          )
          PY

      - name: Commit corrected expectations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/expiry_reminder_preview_sheet_test.dart test/reminder_list_sheet_test.dart
          git commit -m "Update remaining reminder wording expectations"
          git push origin HEAD:copy/direct-life-wording
