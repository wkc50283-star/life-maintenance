name: Capture Drift dependency resolution

on:
  push:
    branches:
      - database/drift-schema-v1

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out schema branch
        uses: actions/checkout@v4
        with:
          ref: database/drift-schema-v1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Capture dependency resolution
        run: |
          set +e
          flutter pub get > /tmp/pub-get.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "flutter pub get exit status: $status"
            echo
            cat /tmp/pub-get.log
          } > diagnostics/drift-pub-get.txt

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/drift-pub-get.txt
          git commit -m "Capture Drift dependency resolution details"
          git push origin HEAD:database/drift-schema-v1
