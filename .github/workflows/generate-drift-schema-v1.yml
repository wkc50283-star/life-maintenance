name: Finalize Drift schema v1

on:
  push:
    branches:
      - database/drift-schema-v1

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out schema branch
        uses: actions/checkout@v4
        with:
          ref: database/drift-schema-v1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve and lock dependencies
        run: flutter pub get

      - name: Finalize schema documentation and cleanup
        run: python3 tool/finalize_drift_schema_v1.py

      - name: Commit final schema v1 files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Drift schema v1 foundation"
          git push origin HEAD:database/drift-schema-v1
