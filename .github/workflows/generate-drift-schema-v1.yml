name: Capture Drift analyzer failure

on:
  push:
    branches:
      - database/drift-schema-v1

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out schema branch
        uses: actions/checkout@v4
        with:
          ref: database/drift-schema-v1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture analyzer output
        run: |
          set +e
          flutter analyze > /tmp/analyze.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "flutter analyze exit status: $status"
            echo
            cat /tmp/analyze.log
          } > diagnostics/drift-analyze.txt

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/drift-analyze.txt
          git commit -m "Capture Drift analyzer failure details"
          git push origin HEAD:database/drift-schema-v1
