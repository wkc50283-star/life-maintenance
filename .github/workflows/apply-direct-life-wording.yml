name: Apply direct life wording

on:
  push:
    branches:
      - copy/direct-life-wording

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out wording branch
        uses: actions/checkout@v4
        with:
          ref: copy/direct-life-wording
          fetch-depth: 0

      - name: Apply guarded wording replacements
        run: python3 tool/apply_direct_life_wording.py

      - name: Verify changes exist
        run: git diff --exit-code --quiet && exit 1 || exit 0

      - name: Commit wording cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "Replace PMS-era wording with direct life labels"
          git push origin HEAD:copy/direct-life-wording
