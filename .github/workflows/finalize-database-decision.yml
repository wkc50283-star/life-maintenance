name: Finalize database decision

on:
  push:
    branches:
      - docs/database-architecture-decision

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out decision branch
        uses: actions/checkout@v4
        with:
          ref: docs/database-architecture-decision

      - name: Finalize database decision documents
        run: python3 tool/finalize_database_decision.py

      - name: Commit database decision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Drift database architecture decision"
          git push origin HEAD:docs/database-architecture-decision
