name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile Drift web worker
        run: dart compile js -O4 web/drift_worker.dart -o web/drift_worker.dart.js

      - name: Prepare matching sqlite3 wasm
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tool/prepare_drift_web_assets.py

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build formal production app
        run: flutter build web --release --base-href /life-maintenance/ --pwa-strategy=none

      - name: Check web build artifact
        run: |
          test -s build/web/index.html
          test -s build/web/drift_worker.dart.js
          test -s build/web/sqlite3.wasm
          test -s build/web/service_worker_retirement.js
          grep -q '<base href="/life-maintenance/">' build/web/index.html
          grep -q 'service_worker_retirement.js' build/web/index.html
          grep -q 'registration.scope === appScope' build/web/service_worker_retirement.js
          grep -q 'registration.unregister()' build/web/service_worker_retirement.js
          test ! -s build/web/flutter_service_worker.js
          if grep -q 'serviceWorkerVersion: "' build/web/flutter_bootstrap.js; then
            echo "Deprecated Flutter service worker must stay disabled"
            exit 1
          fi
          if grep -R -q '生活管理樣板審查\|首頁樣板' build/web; then
            echo "Prototype content must not be deployed to Pages"
            exit 1
          fi
          if [ ! -s build/web/main.dart.js ] && [ ! -s build/web/flutter_bootstrap.js ]; then
            echo "Flutter web entry bundle not found"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
