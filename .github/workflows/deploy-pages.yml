name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile Drift web worker
        run: dart compile js -O4 web/drift_worker.dart -o web/drift_worker.dart.js

      - name: Prepare matching sqlite3 wasm
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 tool/prepare_drift_web_assets.py

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build latest visual review app
        run: flutter build web --release -t lib/prototype_main.dart --base-href /life-maintenance/

      - name: Check web build artifact
        run: |
          test -s build/web/index.html
          test -s build/web/drift_worker.dart.js
          test -s build/web/sqlite3.wasm
          grep -q '<base href="/life-maintenance/">' build/web/index.html
          if [ ! -s build/web/main.dart.js ] && [ ! -s build/web/flutter_bootstrap.js ]; then
            echo "Flutter web entry bundle not found"
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
