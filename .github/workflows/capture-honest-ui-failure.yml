name: Capture honest UI test failure

on:
  push:
    branches:
      - cleanup/honest-ui

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/honest-ui

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Capture test failure
        run: |
          set +e
          flutter test > /tmp/flutter-test.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "flutter test exit status: $status"
            echo
            grep -n -E "TestFailure|Expected:|Actual:|Which:|test/.*\.dart|StateError|Exception|Some tests failed|══" /tmp/flutter-test.log || true
            echo
            echo "===== final 180 lines ====="
            tail -n 180 /tmp/flutter-test.log
          } > diagnostics/honest-ui-test-failure.txt

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/honest-ui-test-failure.txt
          git commit -m "Capture honest UI test failure details"
          git push origin HEAD:cleanup/honest-ui
