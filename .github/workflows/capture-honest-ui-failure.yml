name: Fix honest UI history expectation

on:
  push:
    branches:
      - cleanup/honest-ui

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/honest-ui

      - name: Correct stale history expectation
        run: python3 tool/fix_honest_ui_history_expectations.py

      - name: Commit corrected test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update history expectations for hidden internal IDs"
          git push origin HEAD:cleanup/honest-ui
