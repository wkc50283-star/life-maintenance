name: Remove mock item fallback

on:
  push:
    branches:
      - refactor/maintenance-card-catalog

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out catalog branch
        uses: actions/checkout@v4
        with:
          ref: refactor/maintenance-card-catalog

      - name: Remove mock item fallback
        run: python3 tool/remove_mock_item_fallback.py

      - name: Commit fallback removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove remaining mock item fallback"
          git push origin HEAD:refactor/maintenance-card-catalog
