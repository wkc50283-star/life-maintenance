name: Capture catalog analyze failure

on:
  push:
    branches:
      - refactor/maintenance-card-catalog

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out catalog branch
        uses: actions/checkout@v4
        with:
          ref: refactor/maintenance-card-catalog

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Capture analyze output
        run: |
          set +e
          flutter analyze > /tmp/flutter-analyze.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "flutter analyze exit status: $status"
            echo
            cat /tmp/flutter-analyze.log
          } > diagnostics/catalog-analyze-failure.txt

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/catalog-analyze-failure.txt
          git commit -m "Capture maintenance catalog analyze failure"
          git push origin HEAD:refactor/maintenance-card-catalog
