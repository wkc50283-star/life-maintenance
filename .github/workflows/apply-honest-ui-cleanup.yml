name: Apply honest UI cleanup

on:
  push:
    branches:
      - cleanup/honest-ui

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/honest-ui

      - name: Apply guarded cleanup
        run: python3 tool/apply_honest_ui_cleanup.py

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove nonfunctional UI and internal identifiers"
          git push origin HEAD:cleanup/honest-ui
