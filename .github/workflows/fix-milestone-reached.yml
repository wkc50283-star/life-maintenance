name: Fix milestone reached state

on:
  push:
    branches:
      - model/milestone-foundation

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out milestone branch
        uses: actions/checkout@v4
        with:
          ref: model/milestone-foundation

      - name: Correct reached-state logic
        run: python3 tool/fix_milestone_reached.py

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct milestone reached-state semantics"
          git push origin HEAD:model/milestone-foundation
