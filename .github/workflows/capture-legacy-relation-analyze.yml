name: Capture legacy relation analyze failure

on:
  push:
    branches:
      - audit/legacy-data-relations

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: audit/legacy-data-relations

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture analyze output
        run: |
          set +e
          flutter analyze > /tmp/flutter-analyze.log 2>&1
          status=$?
          mkdir -p diagnostics
          {
            echo "flutter analyze exit status: $status"
            echo
            cat /tmp/flutter-analyze.log
          } > diagnostics/legacy-relation-analyze.txt

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/legacy-relation-analyze.txt
          git commit -m "Capture legacy relation analyzer output"
          git push origin HEAD:audit/legacy-data-relations
